spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- ANGULAR CORS CONFIGURATION
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# 1. Route for User Writes (Command)
spring.cloud.gateway.routes[0].id=user-ms-w
spring.cloud.gateway.routes[0].uri=lb://USER-MS-W
spring.cloud.gateway.routes[0].predicates[0]=Path=/user/command/**

# 2. Route for User Reads (Query)
spring.cloud.gateway.routes[1].id=user-ms-r
spring.cloud.gateway.routes[1].uri=lb://USER-MS-R
spring.cloud.gateway.routes[1].predicates[0]=Path=/user/query/**

# 3. Product Service Route
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/product/**

# 4. Order Service Route
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/order/**