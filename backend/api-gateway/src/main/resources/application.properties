spring.application.name=api-gateway
server.port=9999

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# CORS is configured in GatewayCorsConfig (gateway-only; microservices keep cors disabled)

# Route 1 — User Writes
spring.cloud.gateway.server.webmvc.routes[0].id=user-ms-w
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-MS-W
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/user/command/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=0

# Route 2 — User Reads
spring.cloud.gateway.server.webmvc.routes[1].id=user-ms-r
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USER-MS-R
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/user/query/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=0

# Route 3 — Product Service
spring.cloud.gateway.server.webmvc.routes[2].id=product-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/product/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=0

# Route 4 — Order Service (orders)
spring.cloud.gateway.server.webmvc.routes[3].id=order-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/order/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=StripPrefix=0

# Route 5 — Order Service (cart)
spring.cloud.gateway.server.webmvc.routes[4].id=order-service-cart
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/cart/**
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=StripPrefix=0
