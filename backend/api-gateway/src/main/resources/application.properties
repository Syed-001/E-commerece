spring.application.name=api-gateway
server.port=9999

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


# CORS Gateway handles this for all microservices
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Route 1  User Writes
spring.cloud.gateway.routes[0].id=user-ms-w
spring.cloud.gateway.routes[0].uri=lb://USER-MS-W
spring.cloud.gateway.routes[0].predicates[0]=Path=/user/command/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# Route 2  User Reads
spring.cloud.gateway.routes[1].id=user-ms-r
spring.cloud.gateway.routes[1].uri=lb://USER-MS-R
spring.cloud.gateway.routes[1].predicates[0]=Path=/user/query/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# Route 3  Product Service
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/product/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

# Route 4  Order Service
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/order/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0